services:
  # ── Primary PACS Server ────────────────────────────
  # Full PACS with C-ECHO, C-STORE, C-FIND, C-MOVE via dcmqrscp
  pacs-server:
    build: .
    mem_limit: ${DICOM_MEM_LIMIT:-512m}
    cpus: ${DICOM_CPUS:-1.0}
    # Defence-in-depth on top of the non-root 'pacs' user: drop all Linux
    # capabilities (the DICOM listener binds a high port, so none are needed)
    # and forbid privilege escalation. A read_only root filesystem is deferred:
    # the entrypoint renders the config to /tmp and several DCMTK tools use
    # temp files, so it would need tmpfs mounts to be added safely.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ROLE=pacs-server
      - AE_TITLE=${PACS1_AE_TITLE:-DCMTK_PACS}
      - DICOM_PORT=${DICOM_PORT:-11112}
      - STORAGE_DIR=/dicom/db
      - MAX_PDU_SIZE=${MAX_PDU_SIZE:-16384}
      - MAX_ASSOCIATIONS=${MAX_ASSOCIATIONS:-16}
      - MAX_STUDIES=${MAX_STUDIES:-200}
      - MAX_BYTES_PER_STUDY=${MAX_BYTES_PER_STUDY:-1024mb}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GENERATE_TEST_DATA=${GENERATE_TEST_DATA:-true}
      - GENERATE_PIXEL_DATA=${GENERATE_PIXEL_DATA:-false}
      - PIXEL_DATA_PROFILE=${PIXEL_DATA_PROFILE:-conservative}
      - CT_PIXEL_ROWS=${CT_PIXEL_ROWS:-}
      - CT_PIXEL_COLS=${CT_PIXEL_COLS:-}
      - MR_PIXEL_ROWS=${MR_PIXEL_ROWS:-}
      - MR_PIXEL_COLS=${MR_PIXEL_COLS:-}
      - CR_PIXEL_ROWS=${CR_PIXEL_ROWS:-}
      - CR_PIXEL_COLS=${CR_PIXEL_COLS:-}
      - TEST_DATA_DIR=/dicom/testdata
      - OID_ROOT=${OID_ROOT:-1.2.826.0.1.3680043.8.499}
      # Peer configuration for HostTable
      - PACS2_AE_TITLE=${PACS2_AE_TITLE:-DCMTK_PAC2}
      - STORESCP_AE_TITLE=${STORESCP_AE_TITLE:-STORE_SCP}
      - TEST_SCU_AE_TITLE=${TEST_SCU_AE_TITLE:-TEST_SCU}
      - CONFIG_TEMPLATE=/etc/dcmtk/dcmqrscp-primary.cfg.template
      # Ad-hoc C-MOVE destinations: "name=AE:host:port ..." (empty = none)
      - EXTRA_PEERS=${EXTRA_PEERS:-}
    ports:
      - "${PACS_BIND_ADDR:-0.0.0.0}:${PACS1_HOST_PORT:-11112}:11112"
    volumes:
      - pacs-data:/dicom/db
      - ./config:/etc/dcmtk:ro
    networks:
      - dicom-net
    healthcheck:
      test: ["CMD-SHELL", "echoscu -aec $$AE_TITLE localhost 11112"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Secondary PACS Server ──────────────────────────
  # Second PACS instance for multi-PACS testing scenarios
  pacs-server-2:
    build: .
    mem_limit: ${DICOM_MEM_LIMIT:-512m}
    cpus: ${DICOM_CPUS:-1.0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ROLE=pacs-server
      - AE_TITLE=${PACS2_AE_TITLE:-DCMTK_PAC2}
      - DICOM_PORT=${DICOM_PORT:-11112}
      - STORAGE_DIR=/dicom/db
      - MAX_PDU_SIZE=${MAX_PDU_SIZE:-16384}
      - MAX_ASSOCIATIONS=${MAX_ASSOCIATIONS:-16}
      - MAX_STUDIES=${MAX_STUDIES:-200}
      - MAX_BYTES_PER_STUDY=${MAX_BYTES_PER_STUDY:-1024mb}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GENERATE_TEST_DATA=false
      # Peer configuration for HostTable
      - PACS1_AE_TITLE=${PACS1_AE_TITLE:-DCMTK_PACS}
      - STORESCP_AE_TITLE=${STORESCP_AE_TITLE:-STORE_SCP}
      - TEST_SCU_AE_TITLE=${TEST_SCU_AE_TITLE:-TEST_SCU}
      - CONFIG_TEMPLATE=/etc/dcmtk/dcmqrscp-secondary.cfg.template
      # Ad-hoc C-MOVE destinations: "name=AE:host:port ..." (empty = none)
      - EXTRA_PEERS=${EXTRA_PEERS:-}
    ports:
      - "${PACS_BIND_ADDR:-0.0.0.0}:${PACS2_HOST_PORT:-11113}:11112"
    volumes:
      - pacs2-data:/dicom/db
      - ./config:/etc/dcmtk:ro
    networks:
      - dicom-net
    healthcheck:
      test: ["CMD-SHELL", "echoscu -aec $$AE_TITLE localhost 11112"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Store SCP Receiver (C-MOVE destination) ────────
  # Lightweight receiver for C-MOVE retrieval testing
  storescp-receiver:
    build: .
    mem_limit: ${DICOM_MEM_LIMIT:-512m}
    cpus: ${DICOM_CPUS:-1.0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ROLE=storescp
      - AE_TITLE=${STORESCP_AE_TITLE:-STORE_SCP}
      - DICOM_PORT=${DICOM_PORT:-11112}
      - STORAGE_DIR=/dicom/received
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${PACS_BIND_ADDR:-0.0.0.0}:${STORESCP_HOST_PORT:-11114}:11112"
    volumes:
      - received-data:/dicom/received
    networks:
      - dicom-net
    healthcheck:
      test: ["CMD-SHELL", "echoscu -aet HEALTHCHECK -aec $$AE_TITLE localhost 11112"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Modality Worklist Server (wlmscpfs) ────────────
  # Serves a Modality Worklist (findscu -W) built from the same fixture
  # manifest as the Q/R data, so a modality sees the patients it will store.
  mwl-server:
    build: .
    mem_limit: ${DICOM_MEM_LIMIT:-512m}
    cpus: ${DICOM_CPUS:-1.0}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ROLE=worklist
      - AE_TITLE=${WLM_AE_TITLE:-DCMTK_WLM}
      - WLM_AE_TITLE=${WLM_AE_TITLE:-DCMTK_WLM}
      - WLM_STATION_AE=${WLM_STATION_AE:-MODALITY01}
      - DICOM_PORT=11112
      - WLM_DATA_DIR=/dicom/worklist
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - OID_ROOT=${OID_ROOT:-1.2.826.0.1.3680043.8.499}
    ports:
      - "${PACS_BIND_ADDR:-0.0.0.0}:${WLM_HOST_PORT:-11115}:11112"
    volumes:
      - worklist-data:/dicom/worklist
    networks:
      - dicom-net
    healthcheck:
      test: ["CMD-SHELL", "echoscu -aet HEALTHCHECK -aec $$AE_TITLE localhost 11112"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Test Client ────────────────────────────────────
  # Interactive container with all DCMTK SCU tools
  test-client:
    build: .
    # The test-client generates synthetic data into the host-bind-mounted ./data
    # (owned by the host user), so it runs as root to keep that path writable.
    # The network-facing PACS and receiver services run as the non-root 'pacs'
    # user; this helper has no published ports and only runs SCU tools.
    user: root
    mem_limit: ${DICOM_MEM_LIMIT:-512m}
    cpus: ${DICOM_CPUS:-1.0}
    environment:
      - ROLE=test-client
      - AE_TITLE=${TEST_SCU_AE_TITLE:-TEST_SCU}
      - PACS_HOST=pacs-server
      - PACS_PORT=11112
      - PACS_AE_TITLE=${PACS1_AE_TITLE:-DCMTK_PACS}
      - PACS2_HOST=pacs-server-2
      - PACS2_AE_TITLE=${PACS2_AE_TITLE:-DCMTK_PAC2}
      - STORESCP_HOST=storescp-receiver
      - STORESCP_AE_TITLE=${STORESCP_AE_TITLE:-STORE_SCP}
      - GENERATE_TEST_DATA=${GENERATE_TEST_DATA:-true}
      - GENERATE_PIXEL_DATA=${GENERATE_PIXEL_DATA:-false}
      - PIXEL_DATA_PROFILE=${PIXEL_DATA_PROFILE:-conservative}
      - CT_PIXEL_ROWS=${CT_PIXEL_ROWS:-}
      - CT_PIXEL_COLS=${CT_PIXEL_COLS:-}
      - MR_PIXEL_ROWS=${MR_PIXEL_ROWS:-}
      - MR_PIXEL_COLS=${MR_PIXEL_COLS:-}
      - CR_PIXEL_ROWS=${CR_PIXEL_ROWS:-}
      - CR_PIXEL_COLS=${CR_PIXEL_COLS:-}
      - TEST_DATA_DIR=/dicom/testdata
      - OID_ROOT=${OID_ROOT:-1.2.826.0.1.3680043.8.499}
      - STORESCP_STORAGE_DIR=/dicom/received
      - WLM_HOST=mwl-server
      - WLM_AE_TITLE=${WLM_AE_TITLE:-DCMTK_WLM}
      - WLM_STATION_AE=${WLM_STATION_AE:-MODALITY01}
    volumes:
      - ./data:/dicom/testdata
      - ./tests:/tests:ro
      # Mount the storescp-receiver storage so C-MOVE tests can clean
      # incoming files between cases and verify the arrived instances
      # (count + DICOM UID match) instead of relying on movescu exit
      # codes alone. See issue #33.
      - received-data:/dicom/received
    networks:
      - dicom-net
    depends_on:
      pacs-server:
        condition: service_healthy
      pacs-server-2:
        condition: service_healthy
      storescp-receiver:
        condition: service_healthy
      mwl-server:
        condition: service_healthy

networks:
  dicom-net:
    driver: bridge

volumes:
  pacs-data:
  pacs2-data:
  received-data:
  worklist-data:
